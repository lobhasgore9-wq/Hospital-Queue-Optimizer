services:
  - type: web
    name: hqo-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "False"
      # Make sure to set these in the Render Dashboard after deployment!
      # - key: FIREBASE_PROJECT_ID
      #   sync: false
      # - key: FIREBASE_CLIENT_EMAIL
      #   sync: false
      # - key: FIREBASE_PRIVATE_KEY
      #   sync: false
